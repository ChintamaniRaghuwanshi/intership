<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="Name">NAME:</label><br><br>
        <input type="text" placeholder="Enter your name" name="Name" id="Name" ><br><br>
        <label for="Age">AGE:</label><br><br>
        <input type="number" placeholder="Enter your age" name="Age" id="Age" ><br><br>
        <label for="Email">EMAIL ADDRESS:</label><br><br>
        <input type="email" placeholder="Enter your email" id="Email" name="Email"><br><br>
        <label for="password">PASSWORD:</label><br><br>
        <input type="password" placeholder="Enter your password" name="password" id="password" minlength="6"><br><br>
        <button type="submit">SUMBIT</button>
        <button type="reset">RESET</button>
        <P>Select your gender</P>
        <input type="radio" name="gender" id="Male" value="Male">
        <label for="gender">Male</label>
        <input type="radio" name="gender" id="Female" value="Female">
        <label for="gender">Female</label><br>
        <br>
        <label for="Technologies">TECHNOLOGIES:</label>
        <input type="checkbox" name="Technologies" id="Technologies" value="html"><br>
        <br>
        <label for="country">COUNTRY:</label>
        <select name="country" id="country">
            <option value="select">Select your country</option>
            <option value="India">INDIA</option>
            <option value="UK">UK</option>
        </select>

    </form>

</body>
</html>
