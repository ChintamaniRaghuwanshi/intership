<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style >
        body{
            background: brown;
        }
        .square{
            width: 200px;
            height: 200px;
            background-color: aquamarine;
            font-size: 11em;
            text-align: center;
            animation-name: glow;
            animation-duration: 2s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }
        .square:hover{
           
        }
        
        @keyframes sideleft{
            from{transform: translate(300%);}
        }
        @keyframes rotate{
            50%{
                transform: rotate(90deg);
            }
        }
        @keyframes grow{
            50%{
                transform: scale(2,2);
            }
        }
        @keyframes shrink{
            50%{
                transform: scale(0.5,0.5);
            }
        }
        @keyframes fade{
             50%{
                opacity:0;
            }
        }
        @keyframes colorchange{
            0%{background-color: beige;}
            20%{background-color: blue;}
            40%{background-color: brown;}
            60%{background-color: blueviolet;}
        }
        @keyframes glow{
            0%{
                box-shadow: 0px 0px 60px yellow;
            }
        }
    </style>
</head>
<body>
    <div class="square">hii</div>
</body>
</html>
